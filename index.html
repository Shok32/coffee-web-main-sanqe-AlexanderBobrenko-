<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haptic Hit</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --accent: #007aff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            user-select: none;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        .stat { font-size: 14px; color: #8e8e93; margin: 5px 0; }
        .impact-value { font-size: 32px; font-weight: bold; color: var(--accent); text-align: center; margin: 10px 0; }
        label { display: block; margin-top: 15px; font-weight: 500; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .file-input { margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Haptic Sound App</h1>
        
        <div class="stat">Текущая сила:</div>
        <div id="accelDisplay" class="impact-value">0.00</div>
        
        <label>Чувствительность (порог g): <span id="threshVal">3.0</span></label>
        <input type="range" id="threshold" min="1.5" max="10" step="0.1" value="3.0">
        
        <label>Громкость:</label>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.8">

        <label>Загрузить свой звук (.mp3):</label>
        <input type="file" id="audioUpload" accept="audio/*" class="file-input">
    </div>

    <button id="startBtn">Активировать датчики</button>

    <audio id="hitSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        const startBtn = document.getElementById('startBtn');
        const accelDisplay = document.getElementById('accelDisplay');
        const thresholdInput = document.getElementById('threshold');
        const threshVal = document.getElementById('threshVal');
        const volumeInput = document.getElementById('volume');
        const audio = document.getElementById('hitSound');
        const audioUpload = document.getElementById('audioUpload');

        let isMonitoring = false;
        let lastHit = 0;

        // Смена звука пользователем
        audioUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
            }
        });

        // Обновление текста порога
        thresholdInput.oninput = () => threshVal.innerText = thresholdInput.value;

        startBtn.onclick = async () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                // Запрос разрешения для iOS
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') {
                        toggleMonitoring();
                    } else {
                        alert("Доступ к датчикам отклонен");
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                // Для других браузеров
                toggleMonitoring();
            }
            
            // "Прогреваем" аудио-контекст (нужно для iOS)
            audio.play();
            audio.pause();
        };

        function toggleMonitoring() {
            isMonitoring = !isMonitoring;
            startBtn.innerText = isMonitoring ? "Стоп" : "Активировать датчики";
            startBtn.style.background = isMonitoring ? "#ff3b30" : "#007aff";

            if (isMonitoring) {
                window.addEventListener('devicemotion', handleMotion);
            } else {
                window.removeEventListener('devicemotion', handleMotion);
                accelDisplay.innerText = "0.00";
            }
        }

        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            // Считаем общую силу (векторная сумма)
            const total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            accelDisplay.innerText = total.toFixed(2);

            const threshold = parseFloat(thresholdInput.value);
            const now = Date.now();

            // Если удар превышает порог и прошло > 300мс с прошлого удара
            if (total > threshold && (now - lastHit > 300)) {
                audio.volume = volumeInput.value;
                audio.currentTime = 0;
                audio.play();
                lastHit = now;
                
                // Визуальный эффект
                document.body.style.backgroundColor = "#ffcc00";
                setTimeout(() => document.body.style.backgroundColor = "#f2f2f7", 100);
            }
        }
    </script>
</body>
</html>
